services:
  - type: web
    name: mywealthai-backend
    env: python
    buildCommand: pip install -r requirements.txt && python train_models.py
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        value: mywealthai-secret-2026
      - key: GROQ_API_KEY
        value: your-groq-api-key-here