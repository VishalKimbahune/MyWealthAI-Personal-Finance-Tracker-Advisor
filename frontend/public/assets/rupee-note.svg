<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5a4"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="36" fill="#f8fafc"/>
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="680" height="420" rx="28" fill="url(#grad)" opacity="0.98" />
    <rect x="20" y="20" width="640" height="380" rx="16" fill="#ffffff" opacity="0.08" />

    <!-- Rupee symbol circle -->
    <circle cx="170" cy="210" r="90" fill="#fff" />
    <text x="170" y="235" font-family="Segoe UI, Arial" font-size="120" font-weight="700" text-anchor="middle" fill="#059669">₹</text>

    <!-- Note details -->
    <rect x="330" y="90" width="300" height="36" rx="8" fill="#ffffff" opacity="0.9"/>
    <rect x="330" y="150" width="240" height="28" rx="8" fill="#ffffff" opacity="0.9"/>
    <rect x="330" y="200" width="180" height="24" rx="8" fill="#ffffff" opacity="0.9"/>

    <!-- Decorative pattern -->
    <g fill="#ffffff" opacity="0.12">
      <circle cx="120" cy="100" r="6"/>
      <circle cx="140" cy="120" r="6"/>
      <circle cx="100" cy="140" r="6"/>
      <circle cx="140" cy="160" r="6"/>
    </g>
  </g>
</svg>